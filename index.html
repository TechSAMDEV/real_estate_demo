<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>EstateSwift | Premium Real Estate</title>
</head>

<body class="bg-gray-50 text-gray-900 pt-20">

    <!-- Navbar Placeholder -->
    <div id="nav-placeholder"></div>

    <!-- Hero Section -->
    <header class="relative bg-blue-900 text-white py-24 text-center">

        <div class="max-w-4xl mx-auto px-6">
            <h1 class="text-5xl md:text-6xl font-extrabold mb-6">Find Your Future Home</h1>
            <p class="text-xl mb-10 text-blue-100">Curated luxury listings tailored to your lifestyle.</p>
            <a href="properties.html"
                class="bg-yellow-500 hover:bg-yellow-600 text-blue-900 font-bold px-8 py-4 rounded-lg transition">
                Browse Properties
            </a>
        </div>
    </header>

    <!-- Featured Section -->
    <section class="py-16 max-w-7xl mx-auto px-6">
        <h2 class="text-3xl font-bold mb-10 text-center">Featured Listings</h2>
        <!-- Grid for Property Cards -->
        <div id="property-grid" class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <!-- JS will inject cards here from data.js -->
        </div>
    </section>

    <!-- Footer Placeholder -->
    <div id="footer-placeholder"></div>

    <!-- Scripts -->
    <script src="js/components.js"></script>
    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
