<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Contact Us | EstateSwift</title>
</head>

<body class="bg-gray-50 pt-20">

    <div id="nav-placeholder"></div>

    <main class="max-w-4xl mx-auto px-6 py-16">
        <div class="text-center mb-12">
            <h1 class="text-4xl font-bold text-gray-900 mb-4">Get in Touch</h1>
            <p class="text-gray-600">Have questions about a property or want to list your home? Our team is here to
                help.</p>
        </div>

        <div class="grid md:grid-cols-2 gap-12 bg-white p-8 rounded-2xl shadow-sm border">
            <div class="space-y-6">
                <h3 class="font-bold text-xl">Visit Our Office</h3>
                <p class="text-gray-600">123 Victoria Island, <br>Lagos, Nigeria</p>

                <h3 class="font-bold text-xl">General Inquiries</h3>
                <p class="text-blue-600 font-medium">info@estateswift.com</p>

                <h3 class="font-bold text-xl">Call Us</h3>
                <p class="text-gray-600">+234 1 234 5678</p>
            </div>

            <form id="contact-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1">Full Name</label>
                    <input type="text" class="w-full p-3 border rounded-lg" required>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Email Address</label>
                    <input type="email" class="w-full p-3 border rounded-lg" required>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Message</label>
                    <textarea class="w-full p-3 border rounded-lg h-32" required></textarea>
                </div>
                <button type="submit"
                    class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition">
                    Send Message
                </button>
            </form>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="js/components.js"></script>
    <script>
        document.getElementById('contact-form').addEventListener('submit', (e) => {
            e.preventDefault();
            alert('Message received! We will get back to you within 24 hours.');
            e.target.reset();
        });
    </script>
</body>

</html>
