<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Property Details | EstateSwift</title>
</head>

<body class="bg-gray-50 pt-20">

    <div id="nav-placeholder"></div>

    <main class="max-w-6xl mx-auto px-6 py-12">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
            <img id="prop-image" src="" alt="Property" class="w-full h-96 object-cover rounded-2xl shadow-lg">

            <div>
                <h1 id="prop-title" class="text-4xl font-bold mb-4"></h1>
                <p id="prop-price" class="text-2xl font-semibold text-blue-600 mb-2"></p>
                <p id="prop-location" class="text-gray-500 mb-6"></p>

                <hr class="my-6">

                <h3 class="font-bold text-lg mb-4">Interested in this property?</h3>
                <form id="lead-form" class="space-y-4">
                    <input type="text" placeholder="Your Name" class="w-full p-3 border rounded-lg" required>
                    <input type="email" placeholder="Your Email" class="w-full p-3 border rounded-lg" required>
                    <button type="submit"
                        class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700">
                        Inquire Now
                    </button>
                </form>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="js/data.js"></script>
    <script src="js/components.js"></script>
    <script src="js/details.js"></script>

</body>

</html>
